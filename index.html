<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MetGreen">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<title>Metabolic Greenlights</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

  @keyframes pulse-green {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.05); opacity: 1; }
  }
  @keyframes pulse-yellow {
    0%, 100% { transform: scale(1); opacity: 0.85; }
    50% { transform: scale(1.08); opacity: 1; }
  }
  @keyframes pulse-red {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.03); opacity: 0.95; }
  }
  .pulse-green { animation: pulse-green 2.5s ease-in-out infinite; }
  .pulse-yellow { animation: pulse-yellow 1.2s ease-in-out infinite; }
  .pulse-red { animation: pulse-red 3s ease-in-out infinite; }

  .fade-enter { opacity: 0; transform: translateY(8px); }
  .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.6s ease; }
  .fade-exit { opacity: 1; }
  .fade-exit-active { opacity: 0; transition: opacity 0.4s ease; }

  .bg-transition { transition: background-color 1.5s ease; }

  .timeline-now {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: white;
    box-shadow: 0 0 8px rgba(255,255,255,0.8);
    z-index: 10;
  }
  .timeline-now::before {
    content: '';
    position: absolute;
    left: -6px; top: -4px;
    width: 10px; height: 10px;
    background: white;
    border-radius: 50%;
  }

  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(255,255,255,0.3); }
    50% { box-shadow: 0 0 20px rgba(255,255,255,0.6); }
  }
  .active-glow { animation: glow-pulse 2s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ─── Default Schedules ───
const DEFAULT_WEEKDAY = [
  { meal: 'Breakfast', startH: 7, startM: 0, duration: 30 },
  { meal: 'Snack 1', startH: 9, startM: 30, duration: 20 },
  { meal: 'Lunch', startH: 12, startM: 0, duration: 60 },
  { meal: 'Snack 2', startH: 14, startM: 30, duration: 20 },
  { meal: 'Dinner', startH: 17, startM: 0, duration: 90 },
];

const DEFAULT_WEEKEND = [
  { meal: 'Breakfast', startH: 8, startM: 30, duration: 30 },
  { meal: 'Snack 1', startH: 11, startM: 0, duration: 20 },
  { meal: 'Lunch', startH: 13, startM: 30, duration: 60 },
  { meal: 'Snack 2', startH: 16, startM: 0, duration: 20 },
  { meal: 'Dinner', startH: 18, startM: 30, duration: 90 },
];

const YELLOW_MINUTES = 5;

const RED_REMINDERS = [
  { icon: "\u{1F4A7}", text: "Hydrate now \u2014 drink a glass of water" },
  { icon: "\u{1F6B6}", text: "10-min walk activates GLUT4 \u2014 no insulin needed" },
  { icon: "\u{1FAC1}", text: "Coherent breathing: 5\u20136 breaths/min for 2 minutes" },
];

// ─── Settings helpers ───
function loadSettings() {
  try {
    const raw = localStorage.getItem('metgreen-settings');
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

function saveSettings(settings) {
  localStorage.setItem('metgreen-settings', JSON.stringify(settings));
}

function getDefaultSettings() {
  return {
    weekdayMeals: DEFAULT_WEEKDAY.map(m => ({ ...m })),
    weekendEnabled: false,
    weekendMeals: DEFAULT_WEEKEND.map(m => ({ ...m })),
  };
}

// ─── Build SCHEDULE array from meal configs ───
function buildSchedule(meals) {
  const sorted = [...meals].sort((a, b) => (a.startH * 60 + a.startM) - (b.startH * 60 + b.startM));
  const schedule = [];

  for (let i = 0; i < sorted.length; i++) {
    const m = sorted[i];
    const startMin = m.startH * 60 + m.startM;
    const endMin = startMin + m.duration;
    const endH = Math.floor(endMin / 60) % 24;
    const endM = endMin % 60;

    // Red gap before this meal
    if (i === 0) {
      // Overnight red from last meal end to this meal start
      const lastMeal = sorted[sorted.length - 1];
      const lastEndMin = lastMeal.startH * 60 + lastMeal.startM + lastMeal.duration;
      const lastEndH = Math.floor(lastEndMin / 60) % 24;
      const lastEndM = lastEndMin % 60;
      if (lastEndH !== m.startH || lastEndM !== m.startM) {
        schedule.push({ start: [lastEndH, lastEndM], end: [m.startH, m.startM], meal: null, type: 'red' });
      }
    } else {
      const prev = sorted[i - 1];
      const prevEndMin = prev.startH * 60 + prev.startM + prev.duration;
      const prevEndH = Math.floor(prevEndMin / 60) % 24;
      const prevEndM = prevEndMin % 60;
      if (prevEndH !== m.startH || prevEndM !== m.startM) {
        schedule.push({ start: [prevEndH, prevEndM], end: [m.startH, m.startM], meal: null, type: 'red' });
      }
    }

    // Green meal
    schedule.push({ start: [m.startH, m.startM], end: [endH, endM], meal: m.meal, type: 'green' });
  }

  return schedule;
}

function toMinutes([h, m]) { return h * 60 + m; }

function getCurrentSlot(now, schedule) {
  const currentMin = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;

  for (let i = 0; i < schedule.length; i++) {
    const slot = schedule[i];
    const startMin = toMinutes(slot.start);
    const endMin = toMinutes(slot.end);

    if (endMin > startMin) {
      if (currentMin >= startMin && currentMin < endMin) {
        return { ...slot, index: i };
      }
    } else {
      if (currentMin >= startMin || currentMin < endMin) {
        return { ...slot, index: i };
      }
    }
  }
  return { ...schedule[schedule.length - 1], index: schedule.length - 1 };
}

function getNextGreenSlot(currentIndex, schedule) {
  for (let i = 1; i <= schedule.length; i++) {
    const idx = (currentIndex + i) % schedule.length;
    if (schedule[idx].type === 'green') return schedule[idx];
  }
  return schedule[0];
}

function getSecondsUntil(now, target) {
  const [th, tm] = target;
  let targetDate = new Date(now);
  targetDate.setHours(th, tm, 0, 0);
  if (targetDate <= now) targetDate.setDate(targetDate.getDate() + 1);
  return Math.max(0, Math.floor((targetDate - now) / 1000));
}

function formatTimer(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;
  if (h > 0) {
    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function formatTime([h, m]) {
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

function isWeekend() {
  const day = new Date().getDay();
  return day === 0 || day === 6;
}

// ─── Notification Manager ───
function useNotifications(schedule) {
  const timersRef = useRef([]);

  const scheduleNotifications = useCallback(() => {
    // Clear old timers
    timersRef.current.forEach(t => clearTimeout(t));
    timersRef.current = [];

    if (Notification.permission !== 'granted') return;

    const now = new Date();

    schedule.forEach((slot, i) => {
      const startMin = toMinutes(slot.start);
      const notifyMin = startMin - 2; // 2 min before

      let notifyDate = new Date(now);
      let notifyH = Math.floor(((notifyMin % 1440) + 1440) % 1440 / 60);
      let notifyM = ((notifyMin % 1440) + 1440) % 1440 % 60;
      notifyDate.setHours(notifyH, notifyM, 0, 0);
      if (notifyDate <= now) notifyDate.setDate(notifyDate.getDate() + 1);

      const delay = notifyDate - now;
      if (delay > 0 && delay < 24 * 60 * 60 * 1000) {
        let body;
        if (slot.type === 'green') {
          body = `${slot.meal} window opens in 2 min \u{1F7E2}`;
        } else {
          // Find what comes after this red slot
          const nextIdx = (i + 1) % schedule.length;
          const next = schedule[nextIdx];
          if (next && next.type === 'green') {
            body = `Eating window closing soon \u{26A0}\u{FE0F}`;
          } else {
            body = `Fasting time \u2014 stay hydrated \u{1F534}`;
          }
        }

        // Try to use service worker for notifications, fall back to direct
        const timer = setTimeout(() => {
          if (navigator.serviceWorker && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
              type: 'SCHEDULE_NOTIFICATION',
              title: 'Metabolic Greenlights',
              body: body,
              delay: 0
            });
          } else {
            new Notification('Metabolic Greenlights', { body: body });
          }
        }, delay);

        timersRef.current.push(timer);
      }
    });
  }, [schedule]);

  useEffect(() => {
    scheduleNotifications();
    // Reschedule every hour
    const interval = setInterval(scheduleNotifications, 60 * 60 * 1000);
    return () => {
      clearInterval(interval);
      timersRef.current.forEach(t => clearTimeout(t));
    };
  }, [scheduleNotifications]);
}

function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ─── Main Traffic Light Screen ───
function MainScreen({ schedule, isWeekendMode }) {
  const [now, setNow] = useState(new Date());
  const [reminderIndex, setReminderIndex] = useState(0);
  const [reminderVisible, setReminderVisible] = useState(true);

  useEffect(() => {
    const timer = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(timer);
  }, []);

  useEffect(() => {
    const interval = setInterval(() => {
      setReminderVisible(false);
      setTimeout(() => {
        setReminderIndex(prev => (prev + 1) % RED_REMINDERS.length);
        setReminderVisible(true);
      }, 400);
    }, 30000);
    return () => clearInterval(interval);
  }, []);

  const slot = getCurrentSlot(now, schedule);
  const secondsToEnd = getSecondsUntil(now, slot.end);
  const isYellow = slot.type === 'green' && secondsToEnd <= YELLOW_MINUTES * 60 && secondsToEnd > 0;

  let state, bgClass;
  if (isYellow) {
    state = 'yellow';
    bgClass = 'bg-amber-500';
  } else if (slot.type === 'green') {
    state = 'green';
    bgClass = 'bg-emerald-600';
  } else {
    state = 'red';
    bgClass = 'bg-red-900';
  }

  const nextGreen = state === 'red' ? getNextGreenSlot(slot.index, schedule) : null;
  const secondsToNextGreen = nextGreen ? getSecondsUntil(now, nextGreen.start) : 0;
  const reminder = RED_REMINDERS[reminderIndex];

  return (
    <div className={`${bgClass} bg-transition w-full h-full flex flex-col items-center justify-center px-6 text-white relative overflow-hidden`}>

      {/* Weekend mode badge */}
      {isWeekendMode && (
        <div className="absolute top-4 right-4 bg-indigo-600/80 backdrop-blur px-3 py-1 rounded-full text-xs font-medium"
             style={{ marginTop: 'env(safe-area-inset-top, 0px)' }}>
          Weekend Mode {"\u{1F319}"}
        </div>
      )}

      {/* GREEN STATE */}
      {state === 'green' && (
        <div className="flex flex-col items-center text-center space-y-6 max-w-sm">
          <div className="pulse-green w-32 h-32 rounded-full bg-green-400/40 flex items-center justify-center shadow-lg shadow-green-500/20">
            <div className="w-24 h-24 rounded-full bg-green-400/60 flex items-center justify-center">
              <div className="w-16 h-16 rounded-full bg-green-300"></div>
            </div>
          </div>

          <h1 className="text-4xl font-bold tracking-tight">{slot.meal}</h1>

          <div className="text-lg opacity-90">
            Window closes in: <span className="font-mono text-2xl font-bold ml-1">{formatTimer(secondsToEnd)}</span>
          </div>

          <div className="flex items-center justify-center gap-3 mt-4">
            <div className="flex flex-col items-center">
              <span className="text-3xl">{"\u{1F966}"}</span>
              <span className="text-xs mt-1 opacity-80">First</span>
              <span className="text-[10px] opacity-60">Fiber & Veggies</span>
            </div>
            <span className="text-xl opacity-50">{"\u{2192}"}</span>
            <div className="flex flex-col items-center">
              <span className="text-3xl">{"\u{1F969}"}</span>
              <span className="text-xs mt-1 opacity-80">Second</span>
              <span className="text-[10px] opacity-60">Protein & Fat</span>
            </div>
            <span className="text-xl opacity-50">{"\u{2192}"}</span>
            <div className="flex flex-col items-center">
              <span className="text-3xl">{"\u{1F35E}"}</span>
              <span className="text-xs mt-1 opacity-80">Last</span>
              <span className="text-[10px] opacity-60">Carbs</span>
            </div>
          </div>

          <p className="text-sm opacity-70 mt-4 italic">
            Start with a tablespoon of apple cider vinegar in water
          </p>
        </div>
      )}

      {/* YELLOW STATE */}
      {state === 'yellow' && (
        <div className="flex flex-col items-center text-center space-y-6 max-w-sm">
          <div className="pulse-yellow w-32 h-32 rounded-full bg-yellow-300/40 flex items-center justify-center">
            <div className="w-24 h-24 rounded-full bg-yellow-300/60 flex items-center justify-center">
              <div className="w-16 h-16 rounded-full bg-yellow-200"></div>
            </div>
          </div>

          <div className="text-5xl">{"\u{26A0}\u{FE0F}"}</div>
          <h1 className="text-2xl font-bold">Last 5 minutes</h1>
          <p className="text-lg opacity-90">Eating window closing soon</p>

          <div className="text-lg">
            Window closes in: <span className="font-mono text-2xl font-bold ml-1">{formatTimer(secondsToEnd)}</span>
          </div>

          <p className="text-sm opacity-70 italic">Light snack only if needed</p>
        </div>
      )}

      {/* RED STATE */}
      {state === 'red' && (
        <div className="flex flex-col items-center text-center space-y-6 max-w-sm">
          <div className="pulse-red w-32 h-32 rounded-full bg-red-700/40 flex items-center justify-center">
            <div className="w-24 h-24 rounded-full bg-red-700/60 flex items-center justify-center">
              <div className="w-16 h-16 rounded-full bg-red-500"></div>
            </div>
          </div>

          <p className="text-lg opacity-70 uppercase tracking-widest">Fasting</p>
          <h1 className="text-3xl font-bold">Next: {nextGreen?.meal}</h1>

          <div className="text-lg opacity-90">
            Next window opens in: <span className="font-mono text-2xl font-bold ml-1">{formatTimer(secondsToNextGreen)}</span>
          </div>

          <div className="mt-8 h-20 flex items-center justify-center">
            <div
              className="flex flex-col items-center text-center transition-all duration-500"
              style={{ opacity: reminderVisible ? 1 : 0, transform: reminderVisible ? 'translateY(0)' : 'translateY(8px)' }}
            >
              <span className="text-4xl mb-2">{reminder.icon}</span>
              <p className="text-sm opacity-80 max-w-xs">{reminder.text}</p>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Schedule Screen ───
function ScheduleScreen({ schedule }) {
  const [now, setNow] = useState(new Date());

  useEffect(() => {
    const timer = setInterval(() => setNow(new Date()), 10000);
    return () => clearInterval(timer);
  }, []);

  const currentMin = now.getHours() * 60 + now.getMinutes();
  const dayStartMin = 7 * 60;
  const totalDayMin = 24 * 60;

  function getTopPercent(timeArr) {
    let min = toMinutes(timeArr);
    let offset = min - dayStartMin;
    if (offset < 0) offset += totalDayMin;
    return (offset / totalDayMin) * 100;
  }

  function getHeightPercent(startArr, endArr) {
    let startMin = toMinutes(startArr);
    let endMin = toMinutes(endArr);
    let duration = endMin - startMin;
    if (duration < 0) duration += totalDayMin;
    return (duration / totalDayMin) * 100;
  }

  let nowOffset = currentMin - dayStartMin;
  if (nowOffset < 0) nowOffset += totalDayMin;
  const nowPercent = (nowOffset / totalDayMin) * 100;

  return (
    <div className="w-full h-full bg-gray-950 text-white flex flex-col">
      <div className="px-4 pt-6 pb-3">
        <h2 className="text-xl font-bold">Daily Schedule</h2>
        <p className="text-sm text-gray-400 mt-1">Your metabolic windows for today</p>
      </div>

      <div className="flex-1 overflow-y-auto px-4 pb-24">
        <div className="relative" style={{ height: '900px' }}>
          {Array.from({ length: 25 }, (_, i) => {
            const hour = (7 + i) % 24;
            const topPct = (i / 24) * 100;
            return (
              <div
                key={i}
                className="absolute left-0 text-[10px] text-gray-500 font-mono"
                style={{ top: `${topPct}%`, transform: 'translateY(-50%)' }}
              >
                {String(hour).padStart(2, '0')}:00
              </div>
            );
          })}

          {schedule.map((slot, i) => {
            const top = getTopPercent(slot.start);
            const height = getHeightPercent(slot.start, slot.end);
            const isGreen = slot.type === 'green';
            const isActive = getCurrentSlot(now, schedule).index === i;

            return (
              <div
                key={i}
                className={`absolute left-12 right-2 rounded-lg px-3 py-2 border ${
                  isGreen
                    ? 'bg-emerald-900/60 border-emerald-600/40'
                    : 'bg-red-950/40 border-red-900/30'
                } ${isActive ? 'ring-2 ring-white/50 active-glow' : ''}`}
                style={{ top: `${top}%`, height: `${Math.max(height, 2.5)}%` }}
              >
                <div className="flex justify-between items-start">
                  <span className={`text-xs font-semibold ${isGreen ? 'text-emerald-300' : 'text-red-400'}`}>
                    {slot.meal || 'Fasting'}
                  </span>
                  <span className="text-[10px] text-gray-400 font-mono">
                    {formatTime(slot.start)}-{formatTime(slot.end)}
                  </span>
                </div>
                {height > 4 && (
                  <span className="text-[10px] text-gray-500 mt-0.5 block">
                    {(() => {
                      let d = toMinutes(slot.end) - toMinutes(slot.start);
                      if (d < 0) d += totalDayMin;
                      const h = Math.floor(d / 60);
                      const m = d % 60;
                      return h > 0 ? `${h}h ${m > 0 ? m + 'min' : ''}` : `${m} min`;
                    })()}
                  </span>
                )}
              </div>
            );
          })}

          <div className="timeline-now" style={{ top: `${nowPercent}%` }}>
            <span className="absolute right-0 -top-3 text-[9px] text-white font-mono bg-white/20 px-1 rounded">
              NOW
            </span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Settings Screen ───
function SettingsScreen({ settings, onSave }) {
  const [weekdayMeals, setWeekdayMeals] = useState(settings.weekdayMeals.map(m => ({ ...m })));
  const [weekendEnabled, setWeekendEnabled] = useState(settings.weekendEnabled);
  const [weekendMeals, setWeekendMeals] = useState(settings.weekendMeals.map(m => ({ ...m })));
  const [notifPermission, setNotifPermission] = useState(
    'Notification' in window ? Notification.permission : 'denied'
  );

  function updateMeal(list, setList, idx, field, value) {
    const copy = list.map(m => ({ ...m }));
    copy[idx][field] = parseInt(value, 10) || 0;
    setList(copy);
    doSave(list === weekdayMeals ? copy : weekdayMeals, list === weekendMeals ? copy : weekendMeals, weekendEnabled);
  }

  function doSave(wd, we, weEnabled) {
    const s = { weekdayMeals: wd, weekendMeals: we, weekendEnabled: weEnabled };
    saveSettings(s);
    onSave(s);
  }

  function toggleWeekend() {
    const val = !weekendEnabled;
    setWeekendEnabled(val);
    doSave(weekdayMeals, weekendMeals, val);
  }

  function resetDefaults() {
    const def = getDefaultSettings();
    setWeekdayMeals(def.weekdayMeals);
    setWeekendMeals(def.weekendMeals);
    setWeekendEnabled(def.weekendEnabled);
    doSave(def.weekdayMeals, def.weekendMeals, def.weekendEnabled);
  }

  function handleRequestNotif() {
    if ('Notification' in window) {
      Notification.requestPermission().then(p => setNotifPermission(p));
    }
  }

  function formatTimeInput(h, m) {
    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
  }

  function handleTimeChange(list, setList, idx, timeStr) {
    const [h, m] = timeStr.split(':').map(Number);
    const copy = list.map(ml => ({ ...ml }));
    copy[idx].startH = h;
    copy[idx].startM = m;
    setList(copy);
    doSave(list === weekdayMeals ? copy : weekdayMeals, list === weekendMeals ? copy : weekendMeals, weekendEnabled);
  }

  function MealEditor({ meals, setMeals, label }) {
    return (
      <div className="space-y-3">
        <h3 className="text-sm font-semibold text-gray-300 uppercase tracking-wide">{label}</h3>
        {meals.map((meal, idx) => (
          <div key={idx} className="bg-gray-800/60 rounded-lg p-3 space-y-2">
            <div className="text-sm font-medium text-emerald-400">{meal.meal}</div>
            <div className="flex items-center gap-3">
              <div className="flex-1">
                <label className="text-[10px] text-gray-500 block mb-1">Start Time</label>
                <input
                  type="time"
                  value={formatTimeInput(meal.startH, meal.startM)}
                  onChange={(e) => handleTimeChange(meals, setMeals, idx, e.target.value)}
                  className="w-full bg-gray-700 text-white text-sm rounded px-2 py-1.5 border border-gray-600 focus:border-emerald-500 outline-none"
                />
              </div>
              <div className="w-24">
                <label className="text-[10px] text-gray-500 block mb-1">Duration (min)</label>
                <input
                  type="number"
                  min="5"
                  max="180"
                  value={meal.duration}
                  onChange={(e) => updateMeal(meals, setMeals, idx, 'duration', e.target.value)}
                  className="w-full bg-gray-700 text-white text-sm rounded px-2 py-1.5 border border-gray-600 focus:border-emerald-500 outline-none"
                />
              </div>
            </div>
          </div>
        ))}
      </div>
    );
  }

  return (
    <div className="w-full h-full bg-gray-950 text-white flex flex-col">
      <div className="px-4 pt-6 pb-3">
        <h2 className="text-xl font-bold">Settings</h2>
        <p className="text-sm text-gray-400 mt-1">Customize your metabolic schedule</p>
      </div>

      <div className="flex-1 overflow-y-auto px-4 pb-24 space-y-6">

        {/* Notifications */}
        <div className="bg-gray-900/60 rounded-xl p-4 space-y-3">
          <h3 className="text-sm font-semibold text-gray-300 uppercase tracking-wide">Notifications</h3>
          {notifPermission === 'granted' ? (
            <div className="flex items-center gap-2 text-sm text-emerald-400">
              <span>{"\u{2705}"}</span>
              <span>Notifications enabled</span>
            </div>
          ) : notifPermission === 'denied' ? (
            <p className="text-sm text-red-400">Notifications blocked. Enable in browser/system settings.</p>
          ) : (
            <button
              onClick={handleRequestNotif}
              className="bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
            >
              Enable Push Notifications
            </button>
          )}
          <p className="text-[11px] text-gray-500">Get notified 2 min before each schedule change</p>
        </div>

        {/* Weekend Mode */}
        <div className="bg-gray-900/60 rounded-xl p-4">
          <div className="flex items-center justify-between">
            <div>
              <h3 className="text-sm font-semibold text-gray-300">Weekend Mode {"\u{1F319}"}</h3>
              <p className="text-[11px] text-gray-500 mt-1">Later schedule for Sat & Sun</p>
            </div>
            <button
              onClick={toggleWeekend}
              className={`relative w-12 h-7 rounded-full transition-colors ${weekendEnabled ? 'bg-emerald-500' : 'bg-gray-600'}`}
            >
              <div
                className={`absolute top-0.5 w-6 h-6 bg-white rounded-full shadow transition-transform ${weekendEnabled ? 'translate-x-5' : 'translate-x-0.5'}`}
              />
            </button>
          </div>
        </div>

        {/* Weekday Schedule */}
        <div className="bg-gray-900/60 rounded-xl p-4">
          <MealEditor meals={weekdayMeals} setMeals={setWeekdayMeals} label="Weekday Schedule (Mon-Fri)" />
        </div>

        {/* Weekend Schedule */}
        {weekendEnabled && (
          <div className="bg-gray-900/60 rounded-xl p-4">
            <MealEditor meals={weekendMeals} setMeals={setWeekendMeals} label="Weekend Schedule (Sat-Sun)" />
          </div>
        )}

        {/* Reset */}
        <button
          onClick={resetDefaults}
          className="w-full bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm font-medium py-3 rounded-xl transition-colors border border-gray-700"
        >
          Reset to Defaults
        </button>

        {/* Version */}
        <p className="text-center text-[10px] text-gray-600 pb-4">Metabolic Greenlights v1.1</p>
      </div>
    </div>
  );
}

// ─── Install Banner ───
function InstallBanner() {
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const dismissed = localStorage.getItem('metgreen-install-dismissed');
    const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
    if (!dismissed && !isStandalone) {
      setVisible(true);
    }
  }, []);

  function dismiss() {
    localStorage.setItem('metgreen-install-dismissed', '1');
    setVisible(false);
  }

  if (!visible) return null;

  return (
    <div className="fixed top-0 left-0 right-0 z-50 bg-gray-900/95 backdrop-blur border-b border-gray-700 px-4 py-3 flex items-center gap-3"
         style={{ paddingTop: 'max(env(safe-area-inset-top, 0px), 12px)' }}>
      <div className="flex-1 text-sm text-white">
        <span className="font-semibold">Install on iPhone:</span>{' '}
        <span className="opacity-80">tap Share {"\u{2B06}\u{FE0F}"} then "Add to Home Screen"</span>
      </div>
      <button onClick={dismiss} className="text-gray-400 hover:text-white text-xl leading-none px-2">{"\u{2715}"}</button>
    </div>
  );
}

// ─── App Root ───
function App() {
  const [screen, setScreen] = useState('home');
  const [settings, setSettings] = useState(() => loadSettings() || getDefaultSettings());

  const weekendActive = settings.weekendEnabled && isWeekend();
  const activeMeals = weekendActive ? settings.weekendMeals : settings.weekdayMeals;
  const schedule = useMemo(() => buildSchedule(activeMeals), [activeMeals]);

  // Request notification permission on first launch
  useEffect(() => {
    const asked = localStorage.getItem('metgreen-notif-asked');
    if (!asked) {
      localStorage.setItem('metgreen-notif-asked', '1');
      // Slight delay so page loads first
      setTimeout(requestNotificationPermission, 2000);
    }
  }, []);

  // Schedule push notifications
  useNotifications(schedule);

  function handleSettingsSave(newSettings) {
    setSettings({ ...newSettings });
  }

  return (
    <div className="w-full h-full flex flex-col">
      <InstallBanner />
      <div className="flex-1 relative overflow-hidden">
        <div style={{ display: screen === 'home' ? 'block' : 'none', height: '100%' }}>
          <MainScreen schedule={schedule} isWeekendMode={weekendActive} />
        </div>
        <div style={{ display: screen === 'schedule' ? 'block' : 'none', height: '100%' }}>
          <ScheduleScreen schedule={schedule} />
        </div>
        <div style={{ display: screen === 'settings' ? 'block' : 'none', height: '100%' }}>
          <SettingsScreen settings={settings} onSave={handleSettingsSave} />
        </div>
      </div>

      {/* Bottom nav */}
      <div className="flex-shrink-0 bg-gray-950/95 backdrop-blur border-t border-gray-800 flex justify-around items-center"
           style={{ height: '60px', paddingBottom: 'env(safe-area-inset-bottom, 0px)' }}>
        <button
          onClick={() => setScreen('home')}
          className={`flex flex-col items-center gap-0.5 px-4 py-2 rounded-lg transition-colors ${
            screen === 'home' ? 'text-emerald-400' : 'text-gray-500'
          }`}
        >
          <span className="text-xl">{"\u{1F7E2}"}</span>
          <span className="text-[10px] font-medium">Home</span>
        </button>
        <button
          onClick={() => setScreen('schedule')}
          className={`flex flex-col items-center gap-0.5 px-4 py-2 rounded-lg transition-colors ${
            screen === 'schedule' ? 'text-emerald-400' : 'text-gray-500'
          }`}
        >
          <span className="text-xl">{"\u{1F4C5}"}</span>
          <span className="text-[10px] font-medium">Schedule</span>
        </button>
        <button
          onClick={() => setScreen('settings')}
          className={`flex flex-col items-center gap-0.5 px-4 py-2 rounded-lg transition-colors ${
            screen === 'settings' ? 'text-emerald-400' : 'text-gray-500'
          }`}
        >
          <span className="text-xl">{"\u{2699}\u{FE0F}"}</span>
          <span className="text-[10px] font-medium">Settings</span>
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Generate icons via Canvas & register service worker -->
<script>
(function() {
  function drawIcon(size) {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    // Dark background
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, size, size);

    // Rounded rect clip
    const r = size * 0.18;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.clip();
    ctx.fillRect(0, 0, size, size);

    // Traffic light body
    var bodyW = size * 0.36, bodyH = size * 0.7;
    var bodyX = (size - bodyW) / 2, bodyY = (size - bodyH) / 2;
    var bodyR = size * 0.06;
    ctx.beginPath();
    ctx.moveTo(bodyX + bodyR, bodyY);
    ctx.lineTo(bodyX + bodyW - bodyR, bodyY);
    ctx.quadraticCurveTo(bodyX + bodyW, bodyY, bodyX + bodyW, bodyY + bodyR);
    ctx.lineTo(bodyX + bodyW, bodyY + bodyH - bodyR);
    ctx.quadraticCurveTo(bodyX + bodyW, bodyY + bodyH, bodyX + bodyW - bodyR, bodyY + bodyH);
    ctx.lineTo(bodyX + bodyR, bodyY + bodyH);
    ctx.quadraticCurveTo(bodyX, bodyY + bodyH, bodyX, bodyY + bodyH - bodyR);
    ctx.lineTo(bodyX, bodyY + bodyR);
    ctx.quadraticCurveTo(bodyX, bodyY, bodyX + bodyR, bodyY);
    ctx.closePath();
    ctx.fillStyle = '#2a2a2a';
    ctx.fill();

    var circleR = size * 0.1, cx = size / 2, gap = bodyH / 4;

    // Red (dim)
    ctx.beginPath();
    ctx.arc(cx, bodyY + gap, circleR, 0, Math.PI * 2);
    ctx.fillStyle = '#5c1a1a';
    ctx.fill();

    // Yellow (dim)
    ctx.beginPath();
    ctx.arc(cx, bodyY + gap * 2, circleR, 0, Math.PI * 2);
    ctx.fillStyle = '#5c4a1a';
    ctx.fill();

    // Green (bright glow)
    ctx.beginPath();
    ctx.arc(cx, bodyY + gap * 3, circleR * 1.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(74, 222, 128, 0.2)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(cx, bodyY + gap * 3, circleR, 0, Math.PI * 2);
    var grd = ctx.createRadialGradient(cx, bodyY + gap * 3, 0, cx, bodyY + gap * 3, circleR);
    grd.addColorStop(0, '#86efac');
    grd.addColorStop(1, '#22c55e');
    ctx.fillStyle = grd;
    ctx.fill();

    return canvas.toDataURL('image/png');
  }

  // Set apple-touch-icon dynamically
  var icon512 = drawIcon(512);
  var link = document.querySelector('link[rel="apple-touch-icon"]');
  if (link) link.href = icon512;

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  }
})();
</script>
